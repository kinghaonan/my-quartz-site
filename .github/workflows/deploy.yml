name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - main  # 监听 main 分支的推送
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史（Quartz 构建需要）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 兼容 Quartz 的稳定版本
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install  # 替换 npm ci，避免 lock 文件缺失问题
      - name: Build Quartz
        run: npx quartz build  # 若为旧版 Quartz，替换为 npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4